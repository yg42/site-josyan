baseURL = 'https://josyan.netlify.app'
theme = "dream"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = true

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Français"
    title = "Les Jardins de Josyan"
    weight = 1
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    title = "Les Jardins de Josyan"
    weight = 2

[params]
# zenMode = true
showSummaryCoverInPost = true
 
lightTheme = "emerald"
darkTheme = "forest"
 
avatar = "images/jardins_4_2.png"
description = "Les Jardins de Josyan — maison 70 m², vue Pilat et Mont-Blanc, à Saint-Martin-la-Plaine entre Lyon et Saint-Étienne. Activités, visites et bonnes adresses."

[params.advanced]
customCSS = ["css/custom.css"]

[params.navItems]
airbnb = { href = "https://www.airbnb.fr/rooms/1547207124084111439", target = "_blank", icon = "home", title = "Réserver sur Airbnb" }

[markup.goldmark.renderer]
unsafe = true
